<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gota Consciente | Preserve a Vida</title>
    <style>
        :root {
            --marinho: #1a2a6c;
            --azul-medio: #2a5298;
            --azul-claro: #a2d2ff;
            --sucesso: #27ae60;
            --erro: #e74c3c;
            --gelo: #f5f7fa;
            --texto: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--gelo);
            color: var(--texto);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--marinho), var(--azul-medio));
            color: white;
            padding: 4rem 2rem;
            text-align: center;
            border-bottom: 5px solid var(--azul-claro);
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 2rem;
        }

        section {
            background: white;
            margin-bottom: 2rem;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 { color: var(--marinho); border-left: 5px solid var(--azul-claro); padding-left: 10px; }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: var(--gelo);
            padding: 1.5rem;
            border-radius: 10px;
            border-top: 4px solid var(--azul-medio);
        }
